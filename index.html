<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSD Lab | Structure Design for Operations & Business</title>
<link rel="icon" href="favicon.png">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<style>
:root {
  --p: #8366EE; --p2: #9C81E3; --p3: #CAB4F4; --p4: #EDE5FF;
  --dark: #1e1b2e; --dark2: #252538; --cream: #f5f4f8;
  --fg: #1e1b2e; --fg2: #6b6578; --fg3: #9e98ab;
  --white: #ffffff; --border: #e8e0f5; --border2: #d9cef0;
  --nav-h: 68px; --max: 1120px; --r: 12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Pretendard Variable', sans-serif; background: #f5f4f8; color: var(--fg); font-size: 16px; line-height: 1.75; -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; cursor: pointer; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
p { text-wrap: pretty; }

/* ── NAV ── */
.nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: var(--nav-h); background: rgba(254,252,241,0.88); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
.nav-inner { max-width: var(--max); width: 100%; margin: 0 auto; padding: 0 40px; height: 100%; display: flex; align-items: center; justify-content: space-between; }
.nav-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.nav-logo-text { font-size: 16px; font-weight: 800; color: var(--p); }
.nav-links { display: flex; align-items: center; gap: 20px; }
.nav-link { font-size: 14px; font-weight: 500; color: var(--fg2); transition: all .15s; }
.nav-link:hover { color: var(--p); }
.nav-cta { padding: 9px 20px; border-radius: var(--r); background: var(--p); color: #fff; font-size: 14px; font-weight: 700; box-shadow: 0 4px 14px rgba(131,102,238,.35); }

/* ── SECTION ── */
.sec { padding: 88px 0; }
.wrap { max-width: var(--max); margin: 0 auto; padding: 0 40px; }
.sec-label { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--p); margin-bottom: 12px; }

/* ── HERO ── */
.hero { padding: 120px 0 80px; }
.hero-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
.hero-badge { display: inline-flex; padding: 6px 16px; border-radius: 99px; background: var(--p4); color: var(--p); font-size: 13px; font-weight: 700; margin-bottom: 24px; border: 1px solid var(--border2); }
.hero-title { font-size: clamp(32px, 4.2vw, 54px); font-weight: 900; line-height: 1.2; margin-bottom: 20px; }
.hero-title span { color: var(--p); }
.hero-desc { font-size: 17px; color: var(--fg2); margin-bottom: 36px; }
.hero-visual { position: relative; height: 400px; background: linear-gradient(135deg, var(--p4) 0%, #f0ebff 100%); border-radius: 24px; display: flex; align-items: center; justify-content: center; }

/* ── WHY IT MATTERS (DARK) ── */
.why-sec { background: var(--dark); color: #fff; padding: 88px 0; }
.why-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 40px 0; }
.why-card { background: var(--dark2); border: 1px solid #333350; border-radius: 16px; padding: 32px; }
.why-num { font-size: 36px; font-weight: 900; color: var(--p3); margin-bottom: 8px; }
.why-txt { font-size: 13px; color: var(--fg3); line-height: 1.6; }
.diag-banner { background: var(--dark2); border: 1.5px solid var(--p); border-radius: 20px; padding: 32px 40px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
.btn-diag { background: var(--p); color: #fff; padding: 12px 24px; border-radius: 10px; font-weight: 700; white-space: nowrap; }

/* ── CORE SERVICES ── */
.svc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 40px; }
.svc-card { background: #fff; border: 1.5px solid var(--border); border-radius: 20px; padding: 40px; position: relative; }
.svc-icon { width: 48px; height: 48px; background: var(--p4); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 24px; }
.svc-title { font-size: 22px; font-weight: 800; margin-bottom: 12px; }
.svc-desc { font-size: 14px; color: var(--fg2); margin-bottom: 24px; }
.svc-tags { display: flex; gap: 8px; flex-wrap: wrap; }
.svc-tag { padding: 4px 12px; border-radius: 20px; background: #f0ebff; color: var(--p); font-size: 11px; font-weight: 700; }

/* ── STORE (PURPLE BG) ── */
.store-sec { background: #f0eeff; padding: 88px 0; }
.store-banner { background: #fff; border-radius: 20px; padding: 32px 40px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 48px; box-shadow: 0 10px 40px rgba(131,102,238,0.08); }
.shorts-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.short-card { background: var(--dark); border-radius: 16px; overflow: hidden; }
.short-thumb { aspect-ratio: 9/16; background: #252538; display: flex; align-items: center; justify-content: center; color: #fff; position: relative; }
.short-tag { position: absolute; top: 12px; left: 12px; background: rgba(131,102,238,0.6); padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; }
.short-title { padding: 14px; font-size: 13px; font-weight: 600; color: #e0dcfa; line-height: 1.5; }

/* ── FOOTER ── */
.footer { background: var(--dark); color: #fff; padding: 80px 0 40px; text-align: center; }
.foot-cta-main { background: #fff; color: var(--p); padding: 18px 48px; border-radius: 16px; font-size: 18px; font-weight: 800; display: inline-block; margin-bottom: 20px; }
.foot-cta-sub { font-size: 14px; color: var(--fg3); text-decoration: underline; display: block; }
.foot-meta { font-size: 12px; color: #444; margin-top: 60px; text-align: left; line-height: 1.8; }

@media (max-width: 768px) {
  .hero-wrap, .why-grid, .svc-grid, .shorts-grid, .diag-banner, .store-banner { grid-template-columns: 1fr; flex-direction: column; text-align: center; }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

/* ── Logo ── */
const Logo = () => (
  <svg width="32" height="32" viewBox="0 0 100 100" fill="none">
    <circle cx="50" cy="50" r="50" fill="#EDE5FF" />
    <text x="50" y="46" textAnchor="middle" fontSize="34" fontWeight="900" fill="#8366EE" dominantBaseline="middle">NSD</text>
    <text x="50" y="74" textAnchor="middle" fontSize="22" fontWeight="800" fill="#9C81E3" dominantBaseline="middle">Lab</text>
  </svg>
);

/* ── App ── */
function App() {
  const [route, setRoute] = useState(window.location.hash || '#home');
  useEffect(() => {
    const h = () => setRoute(window.location.hash || '#home');
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  }, []);

  const go = (r) => { window.location.hash = r; window.scrollTo(0, 0); };

  return (
    <>
      <nav className="nav">
        <div className="nav-inner">
          <div className="nav-logo" onClick={() => go('#home')}>
            <Logo />
            <span className="nav-logo-text">NSD Lab</span>
          </div>
          <div className="nav-links">
            <a className="nav-link" onClick={() => go('#about')}>소개</a>
            <a className="nav-link" onClick={() => go('#ops')}>시스템 자동화</a>
            <a className="nav-link" onClick={() => go('#store')}>스토어</a>
            <a className="nav-link" onClick={() => go('#cases')}>도입사례</a>
          </div>
          <a className="nav-cta" href="https://pf.kakao.com/_anlqX/chat" target="_blank">문의하기</a>
        </div>
      </nav>

      <div className="page">
        {/* HERO */}
        <section className="sec hero">
          <div className="wrap">
            <div className="hero-wrap">
              <div>
                <div className="hero-badge">Structure Design for Operations & Business</div>
                <h1 className="hero-title">운영이<br/><span>시스템으로 돌아가는</span><br/>구조를 만듭니다.</h1>
                <p className="hero-desc">조직의 업무와 운영 흐름을 한눈에 보고<br/>AI와 자동화로 극대화하는 업무 효율</p>
                <div style={{ display: 'flex', gap: '12px' }}>
                  <a className="nav-cta" style={{ padding: '14px 28px' }} onClick={() => go('#ops')}>운영 시스템 보기</a>
                  <a href="https://pf.kakao.com/_anlqX/chat" target="_blank" style={{ border: '2px solid var(--border2)', padding: '14px 28px', borderRadius: '12px', fontWeight: '700' }}>카톡 상담하기</a>
                </div>
              </div>
              <div className="hero-visual">
                <div style={{ fontSize: '60px' }}>⚙️</div>
                <div style={{ position: 'absolute', bottom: '20px', fontSize: '14px', color: 'var(--p)' }}>Structure Design Visual</div>
              </div>
            </div>
          </div>
        </section>

        {/* WHY IT MATTERS (히어로 바로 아래) */}
        <section className="why-sec">
          <div className="wrap">
            <div className="sec-label" style={{ color: 'var(--p3)' }}>Why It Matters</div>
            <h2 style={{ fontSize: '32px', fontWeight: '800', marginBottom: '8px' }}>대부분의 팀이 모르는 사이 이만큼이 새고 있어요</h2>
            <p className="why-sub">비효율은 느껴지지 않습니다. 그냥 원래 이런 거라고 생각하게 됩니다.</p>
            <div className="why-grid">
              <div className="why-card">
                <div className="why-num">1.8h</div>
                <p className="why-txt">직원 1인이 하루 평균<br/>정보 찾는 데 쓰는 시간</p>
              </div>
              <div className="why-card">
                <div className="why-num">40%</div>
                <p className="why-txt">반복·수작업으로<br/>처리되는 업무 비율</p>
              </div>
              <div className="why-card">
                <div className="why-num">2,000만+</div>
                <p className="why-txt">10인 팀 기준<br/>연간 비효율 비용 추정</p>
              </div>
            </div>
            <div className="diag-banner">
              <div>
                <div style={{ fontSize: '18px', fontWeight: '800', marginBottom: '6px' }}>우리 팀은 얼마나 낭비하고 있을까요?</div>
                <p style={{ fontSize: '13px', color: 'var(--fg3)' }}>3분 진단으로 비효율 구간과 연간 손실 비용을 확인하세요.</p>
              </div>
              <a href="http://diagnosis.nsdlab.kr/" target="_blank" className="btn-diag">운영 진단 테스트 →</a>
            </div>
          </div>
        </section>

        {/* CORE SERVICES (아이콘 추가) */}
        <section className="sec" id="ops">
          <div className="wrap">
            <div className="sec-label">Services</div>
            <h2 style={{ fontSize: '32px', fontWeight: '800' }}>이런 것들을 도와드려요</h2>
            <div className="svc-grid">
              <div className="svc-card">
                <div className="svc-icon">⚙️</div>
                <div style={{ fontSize: '11px', color: 'var(--p3)', fontWeight: '800', marginBottom: '8px' }}>CORE SERVICE 01</div>
                <h3 className="svc-title">운영 시스템 자동화 구축</h3>
                <p className="svc-desc">Notion 기반 시스템에 Make 자동화를 연결해 반복 업무를 없앱니다. 조직의 모든 업무 흐름을 한눈에 볼 수 있습니다.</p>
                <div className="svc-tags"><span className="svc-tag">Notion 시스템</span><span className="svc-tag">Make 자동화</span></div>
              </div>
              <div className="svc-card">
                <div className="svc-icon">👤</div>
                <div style={{ fontSize: '11px', color: 'var(--p3)', fontWeight: '800', marginBottom: '8px' }}>CORE SERVICE 02</div>
                <h3 className="svc-title">맞춤형 프로세스 구축</h3>
                <p className="svc-desc">업종과 팀 구조에 맞게 처음부터 설계하는 운영 프로세스. 실제로 작동하는 구조를 함께 만들어 드립니다.</p>
                <div className="svc-tags"><span className="svc-tag">프로세스 설계</span><span className="svc-tag">맞춤 컨설팅</span></div>
              </div>
            </div>
          </div>
        </section>

        {/* SYSTEM STORE (디자인 개선 + 쇼츠) */}
        <section className="store-sec" id="store">
          <div className="wrap">
            <div className="sec-label">System Store</div>
            <h2 style={{ fontSize: '32px', fontWeight: '800', marginBottom: '40px' }}>모듈만 먼저 도입하고 싶다면</h2>
            <div className="store-banner">
              <div>
                <div style={{ fontSize: '18px', fontWeight: '800', marginBottom: '8px' }}>템플릿 + 자동화 세트, 설치하면 바로 씁니다</div>
                <p style={{ fontSize: '14px', color: 'var(--fg2)', marginBottom: '16px' }}>운영 시스템 구축의 일부를 바로 사용 가능한 형태로 판매합니다.</p>
                <div style={{ display: 'flex', gap: '8px' }}>
                  {['채용 관리', '콘텐츠 트래커', '휴가 신청'].map(t => <span key={t} style={{ fontSize: '11px', border: '1px solid var(--border2)', padding: '4px 10px', borderRadius: '20px', background: '#fff' }}>{t}</span>)}
                </div>
              </div>
              <a className="nav-cta" style={{ padding: '12px 24px' }}>스토어 전체보기</a>
            </div>
            <p style={{ fontSize: '12px', fontWeight: '800', color: 'var(--fg3)', marginBottom: '16px', letterSpacing: '1px' }}>실제 작동하는 모습</p>
            <div className="shorts-grid">
              {['릴스·쇼츠 자동 배포', '유튜브 블로그 자동화', '휴가 신청 시스템', '의사결정 데이터 보드'].map((title, i) => (
                <div key={i} className="short-card">
                  <div className="short-thumb">
                    <span className="short-tag">작동 예시</span>
                    <div style={{ fontSize: '20px' }}>▶</div>
                  </div>
                  <div className="short-title">{title}</div>
                </div>
              ))}
            </div>
          </div>
        </section>

        {/* FOOTER */}
        <footer className="footer">
          <div className="wrap">
            <a href="https://calendar.app.google/JboyqQZ5b9nE7D1i6" target="_blank" className="foot-cta-main">1:1 상담 예약하기</a>
            <a href="https://pf.kakao.com/_anlqX/chat" target="_blank" className="foot-cta-sub">카톡 상담하기</a>
            <div className="foot-meta">
              상호: 엔에스디랩 | 대표: 윤서영<br/>
              NSD Lab은 스타트업 COO 및 쿠팡이츠서비스 PMO 경험을 바탕으로 운영 구조를 설계합니다.<br/>
              Copyright © NSD Lab. All rights reserved.
            </div>
          </div>
        </footer>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
