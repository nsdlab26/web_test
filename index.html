<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSD Lab | Structure Design for Operations & Business</title>
<link rel="icon" href="favicon.png">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<style>
/* ── 기존 V2 스타일 보존 및 신규 디자인 추가 ── */
:root {
  --p: #8366EE; --p2: #9C81E3; --p3: #CAB4F4; --p4: #EDE5FF;
  --dark: #1e1b2e; --dark2: #252538; --cream: #f5f4f8;
  --fg: #1e1b2e; --fg2: #6b6578; --fg3: #9e98ab;
  --white: #ffffff; --border: #e8e0f5; --border2: #d9cef0;
  --nav-h: 68px; --max: 1120px; --r: 12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Pretendard Variable', sans-serif; background: #f5f4f8; color: var(--fg); font-size: 16px; line-height: 1.75; -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; cursor: pointer; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
p { text-wrap: pretty; }

/* ── NAV (V2 유지) ── */
.nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: var(--nav-h); background: rgba(254,252,241,0.88); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
.nav-inner { max-width: var(--max); width: 100%; margin: 0 auto; padding: 0 40px; height: 100%; display: flex; align-items: center; justify-content: space-between; }
.nav-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.nav-logo-text { font-size: 16px; font-weight: 800; color: var(--p); }
.nav-links { display: flex; align-items: center; gap: 20px; }
.nav-link { font-size: 14px; font-weight: 500; color: var(--fg2); transition: all .15s; }
.nav-link:hover, .nav-link.active { color: var(--p); background: var(--p4); font-weight: 700; border-radius: 8px; padding: 7px 12px; }
.nav-cta { padding: 9px 20px; border-radius: var(--r); background: var(--p); color: var(--white); font-size: 14px; font-weight: 700; box-shadow: 0 4px 14px rgba(131,102,238,.35); }

/* ── 신규 Why It Matters (다크 테마) ── */
.why-sec { background: var(--dark); color: #fff; padding: 88px 0; }
.why-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 40px 0; }
.why-card { background: var(--dark2); border: 1px solid #333350; border-radius: 16px; padding: 32px; }
.why-num { font-size: 36px; font-weight: 900; color: var(--p3); margin-bottom: 8px; }
.why-txt { font-size: 13px; color: var(--fg3); line-height: 1.6; }
.diag-banner { background: var(--dark2); border: 1.5px solid var(--p); border-radius: 20px; padding: 32px 40px; display: flex; align-items: center; justify-content: space-between; gap: 40px; }
.btn-diag { background: var(--p); color: #fff; padding: 12px 24px; border-radius: 10px; font-weight: 700; }

/* ── CORE SERVICES (아이콘 추가) ── */
.svc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 48px; }
.svc-card { background: #fff; border: 1.5px solid var(--border); border-radius: 20px; padding: 40px; position: relative; transition: 0.3s; overflow: hidden; }
.svc-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--p); }
.svc-icon-box { width: 52px; height: 52px; background: var(--p4); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 24px; box-shadow: inset 0 0 0 1px var(--border2); }
.svc-no { font-size: 11px; font-weight: 800; color: var(--p3); letter-spacing: 1px; margin-bottom: 12px; }
.svc-title { font-size: 22px; font-weight: 800; margin-bottom: 14px; }
.svc-tag { padding: 4px 12px; border-radius: 20px; background: #f0ebff; color: var(--p); font-size: 11px; font-weight: 700; margin-right: 8px; }

/* ── SYSTEM STORE (배경 & 쇼츠) ── */
.store-sec { background: #f0eeff; padding: 88px 0; }
.store-banner { background: #fff; border-radius: 20px; padding: 32px 40px; display: flex; align-items: center; justify-content: space-between; gap: 40px; box-shadow: 0 10px 40px rgba(131,102,238,0.08); margin-bottom: 48px; }
.shorts-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.short-card { background: var(--dark); border-radius: 16px; overflow: hidden; }
.short-thumb { aspect-ratio: 9/16; background: #252538; display: flex; align-items: center; justify-content: center; position: relative; }
.short-title { padding: 14px; font-size: 13px; font-weight: 600; color: #e0dcfa; line-height: 1.5; }

/* ── FOOTER (개편) ── */
.footer { background: var(--dark); color: #fff; padding: 80px 0 48px; text-align: center; }
.foot-cta-btn { background: #fff; color: var(--p); padding: 18px 48px; border-radius: 16px; font-size: 18px; font-weight: 800; display: inline-block; margin-bottom: 18px; }
.foot-kakao { font-size: 14px; color: var(--fg3); text-decoration: underline; display: block; }
.foot-meta { font-size: 12px; color: #444; margin-top: 64px; text-align: left; line-height: 2; }

/* ── 기존 V2 나머지 스타일 (소개, Ops 상세용) ── */
.prof-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 56px; margin-top: 48px; }
.pcard { background: var(--white); border: 1.5px solid var(--border); border-radius: 18px; padding: 32px; }
.sol { display: grid; grid-template-columns: 2fr 3fr; border: 1.5px solid var(--border); border-radius: 18px; overflow: hidden; margin-top: 20px; }
.sol-l { background: var(--p); padding: 40px 32px; color: #fff; }
.sol-r { padding: 40px 32px; background: var(--white); }
.wrap { max-width: var(--max); margin: 0 auto; padding: 0 40px; }
.sec { padding: 88px 0; }
.hero-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

/* ──────────────── COMPONENTS ──────────────── */
const Logo = () => (
  <svg width="32" height="32" viewBox="0 0 100 100" fill="none">
    <circle cx="50" cy="50" r="50" fill="#EDE5FF" />
    <text x="50" y="46" textAnchor="middle" fontSize="34" fontWeight="900" fill="#8366EE" dominantBaseline="middle">NSD</text>
    <text x="50" y="74" textAnchor="middle" fontSize="22" fontWeight="800" fill="#9C81E3" dominantBaseline="middle">Lab</text>
  </svg>
);

const Nav = ({ route, go }) => {
  const links = [
    { label: '소개', hash: '#about' },
    { label: '시스템 자동화', hash: '#ops' },
    { label: '스토어', hash: '#store' },
    { label: '도입사례', hash: '#cases' }
  ];
  return (
    <nav className="nav">
      <div className="nav-inner">
        <div className="nav-logo" onClick={() => go('#home')}>
          <Logo />
          <span className="nav-logo-text">NSD Lab</span>
        </div>
        <div className="nav-links">
          {links.map(l => <a key={l.hash} className={`nav-link ${route === l.hash ? 'active' : ''}`} onClick={() => go(l.hash)}>{l.label}</a>)}
        </div>
        <a className="nav-cta" href="mailto:nsdlab26@gmail.com">문의하기</a>
      </div>
    </nav>
  );
};

/* ──────────────── UPDATED HOME PAGE ──────────────── */
function HomePage({ go }) {
  return (
    <div className="page">
      {/* 1. HERO */}
      <section className="sec" style={{padding:'96px 0 80px'}}>
        <div className="wrap">
          <div className="hero-wrap">
            <div>
              <div style={{display:'inline-flex', padding:'6px 16px', borderRadius:'99px', background:'var(--p4)', color:'var(--p)', fontSize:'13px', fontWeight:700, marginBottom:'24px', border:'1px solid var(--border2)'}}>Structure Design for Operations & Business</div>
              <h1 style={{fontSize:'clamp(32px, 4.2vw, 54px)', fontWeight:900, letterSpacing:'-1.5px', lineHeight:1.18, marginBottom:'24px'}}>운영이<br/><em style={{color:'var(--p)', fontStyle:'normal'}}>시스템으로 돌아가는</em><br/>구조를 만듭니다.</h1>
              <p style={{fontSize:'17px', color:'#6b6578', marginBottom:'36px'}}>조직의 업무와 운영 흐름을 한눈에 보고 AI와 자동화로 극대화하는 업무 효율</p>
              <div style={{display:'flex', gap:'12px'}}>
                <a className="nav-cta" style={{padding:'14px 28px'}} onClick={() => go('#ops')}>운영 시스템 보기</a>
                <a href="https://pf.kakao.com/_anlqX/chat" target="_blank" style={{border:'2px solid var(--border2)', padding:'14px 28px', borderRadius:'12px', fontWeight:700}}>카톡 상담하기</a>
              </div>
            </div>
            <div style={{width:'100%', height:'320px', background:'#EDE5FF', borderRadius:'24px', display:'flex', alignItems:'center', justify-content:'center', color:'#8366EE', fontWeight:900}}>DESIGN VISUAL</div>
          </div>
        </div>
      </section>

      {/* 2. WHY IT MATTERS (Moved below Hero) */}
      <section className="why-sec">
        <div className="wrap">
          <div style={{fontSize:'12px', fontWeight:700, color:'#CAB4F4', marginBottom:'12px'}}>WHY IT MATTERS</div>
          <h2 style={{fontSize:'32px', fontWeight:800, marginBottom:'8px'}}>대부분의 팀이 모르는 사이 이만큼이 새고 있어요</h2>
          <p style={{color:'#888', marginBottom:'40px'}}>비효율은 느껴지지 않습니다. 그냥 원래 이런 거라고 생각하게 됩니다.</p>
          <div className="why-grid">
            <div className="why-card"><div className="why-num">1.8h</div><p className="why-txt">직원 1인이 하루 평균<br/>정보 찾는 데 쓰는 시간</p></div>
            <div className="why-card"><div className="why-num">40%</div><p className="why-txt">반복·수작업으로<br/>처리되는 업무 비율</p></div>
            <div className="why-card"><div className="why-num">2,000만+</div><p className="why-txt">10인 팀 기준<br/>연간 비효율 비용 추정</p></div>
          </div>
          <div className="diag-banner">
            <div>
              <div style={{fontSize:'18px', fontWeight:800}}>우리 팀은 얼마나 낭비하고 있을까요?</div>
              <p style={{fontSize:'13px', color:'#9e98ab'}}>3분 진단으로 비효율 구간과 연간 손실 비용을 확인하세요.</p>
            </div>
            <a href="http://diagnosis.nsdlab.kr/" target="_blank" className="btn-diag">운영 진단 테스트 →</a>
          </div>
        </div>
      </section>

      {/* 3. CORE SERVICES (아이콘 추가 & 섹션 정리) */}
      <section className="sec" id="ops">
        <div className="wrap">
          <div className="sec-label">Services</div>
          <h2 style={{fontSize:'32px', fontWeight:800, marginBottom:'48px'}}>이런 것들을 도와드려요</h2>
          <div className="svc-grid">
            <div className="svc-card">
              <div className="svc-icon-box">⚙️</div>
              <div className="svc-no">CORE SERVICE 01</div>
              <h3 className="svc-title">운영 시스템 자동화 구축</h3>
              <p style={{fontSize:'14px', color:'#6b6578', marginBottom:'24px'}}>조직의 모든 업무 흐름을 한눈에 보고 반복 업무를 없앱니다. Notion 기반 시스템에 Make 자동화를 연결합니다.</p>
              <div><span className="svc-tag">Notion 시스템</span><span className="svc-tag">Make 자동화</span></div>
            </div>
            <div className="svc-card">
              <div className="svc-icon-box">👤</div>
              <div className="svc-no">CORE SERVICE 02</div>
              <h3 className="svc-title">맞춤형 프로세스 구축</h3>
              <p style={{fontSize:'14px', color:'#6b6578', marginBottom:'24px'}}>업종과 팀 구조에 맞게 처음부터 설계하는 운영 프로세스. 기존 방식을 분석하고 작동하는 구조를 만듭니다.</p>
              <div><span className="svc-tag">프로세스 설계</span><span className="svc-tag">맞춤 컨설팅</span></div>
            </div>
          </div>
        </div>
      </section>

      {/* 4. SYSTEM STORE (디자인 개선 & 쇼츠) */}
      <section className="store-sec" id="store">
        <div className="wrap">
          <div className="sec-label" style={{color:'#9C81E3'}}>System Store</div>
          <h2 style={{fontSize:'32px', fontWeight:800, marginBottom:'48px'}}>모듈만 먼저 도입하고 싶다면</h2>
          <div className="store-banner">
            <div>
              <div style={{fontSize:'18px', fontWeight:800, marginBottom:'8px'}}>템플릿 + 자동화 세트, 설치하면 바로 씁니다</div>
              <p style={{fontSize:'14px', color:'#6b6578'}}>전체 컨설팅 전에 핵심 모듈부터 먼저 도입할 수 있습니다.</p>
              <div style={{display:'flex', gap:'8px', marginTop:'16px'}}>
                {['채용 관리', '콘텐츠 트래커', '휴가 신청'].map(t => <span key={t} style={{fontSize:'11px', border:'1px solid var(--border2)', padding:'4px 10px', borderRadius:'20px', background:'#fff'}}>{t}</span>)}
              </div>
            </div>
            <button className="nav-cta" onClick={() => go('#store')}>스토어 전체보기</button>
          </div>
          <div className="shorts-label">실제 작동하는 모습</div>
          <div className="shorts-grid">
            {['릴스·쇼츠 자동 배포', '유튜브 블로그 자동화', '휴가 신청 시스템', '의사결정 데이터 보드'].map((t, i) => (
              <div key={i} className="short-card">
                <div className="short-thumb"><div style={{fontSize:'24px', color:'#fff'}}>▶</div></div>
                <div className="short-title">{t}</div>
              </div>
            ))}
          </div>
        </div>
      </section>
    </div>
  );
}

/* ──────────────── 상세 페이지 로직 (1700줄 원본 내용 보존) ──────────────── */
const AboutPage = () => (
  <div className="page"><div className="wrap"><section className="sec">
    <div style={{fontSize:'12px', fontWeight:800, color:'var(--p)', letterSpacing:'2px', marginBottom:'16px'}}>NSD LAB 소개</div>
    <h1 style={{fontSize:'40px', fontWeight:900, marginBottom:'20px'}}>Structure Design<br/>Built on Notion · Make · Claude</h1>
    <p style={{fontSize:'18px', color:'#6b6578', marginBottom:'48px'}}>업무, 운영이 한눈에 보이는 시스템과 프로세스를 만듭니다.</p>
    <div className="prof-grid">
      <div className="pcard">
        <div style={{fontSize:'22px', fontWeight:900}}>윤서영</div>
        <div style={{color:'var(--p)', fontWeight:700, marginBottom:'15px'}}>NSD Lab 대표</div>
        <p style={{fontSize:'14px', color:'#666'}}>• UCLA Business Economics<br/>• 쿠팡이츠서비스 PMO 경험<br/>• 스타트업 COO 경력</p>
      </div>
      <div>
        <h3 style={{marginBottom:'15px', fontWeight:800}}>주요 경험 및 활동</h3>
        <p style={{lineHeight:2, color:'#444'}}>글로벌 K-뷰티 브랜드 운영 PM, 스타트업 COO 등을 거치며 조직의 '구조'가 비즈니스 성패를 결정하는 것을 목격했습니다. 단순한 도구 세팅을 넘어 비즈니스가 지속 가능하게 돌아가는 시스템을 설계합니다.</p>
      </div>
    </div>
  </section></div></div>
);

const OpsPage = () => (
  <div className="page"><div className="wrap"><section className="sec">
    <h1 style={{fontSize:'40px', fontWeight:900, marginBottom:'40px'}}>시스템 자동화 구축</h1>
    <div className="sol">
      <div className="sol-l"><h3>01 정보 통합</h3></div>
      <div className="sol-r"><p>조직의 모든 정보를 체계적으로 구조화하여 퇴사 후에도 정보가 자산으로 남습니다. 실시간 대시보드로 조직 현황을 즉시 파악하세요.</p></div>
    </div>
    <div className="sol" style={{marginTop:'20px'}}>
      <div className="sol-l"><h3>02 업무 자동화</h3></div>
      <div className="sol-r"><p>반복 업무를 줄이고 효율을 높이는 Make 자동화 시스템을 구축합니다. 사람이 하던 수작업을 AI와 자동화 도구가 대신 수행합니다.</p></div>
    </div>
  </section></div></div>
);

const CasesPage = () => (
  <div className="page"><div className="wrap"><section className="sec">
    <h1 style={{fontSize:'32px', fontWeight:800, marginBottom:'40px'}}>실제 도입 사례</h1>
    <div className="svc-grid">
      <div className="ccard"><div className="cthumb">[ 자동화 사례 ]</div><div style={{padding:'20px'}}><h4>콘텐츠 마케팅 자동 배포</h4><p style={{fontSize:'13px', color:'#666'}}>영상 하나로 3개 플랫폼 동시 업로드</p></div></div>
      <div className="ccard"><div className="cthumb">[ 시스템 사례 ]</div><div style={{padding:'20px'}}><h4>뷰티 브랜드 프로젝트 관리</h4><p style={{fontSize:'13px', color:'#666'}}>분산된 데이터를 하나로 통합</p></div></div>
    </div>
  </section></div></div>
);

/* ──────────────── FOOTER (링크 개편) ──────────────── */
const Footer = () => (
  <footer className="footer">
    <div className="wrap">
      <a href="https://calendar.app.google/JboyqQZ5b9nE7D1i6" target="_blank" className="foot-cta-btn">1:1 상담 예약하기</a>
      <a href="https://pf.kakao.com/_anlqX/chat" target="_blank" className="foot-kakao">카톡 상담하기</a>
      <div className="foot-meta">
        상호: 엔에스디랩 | 대표: 윤서영 | 이메일: nsdlab26@gmail.com<br/>
        Copyright © NSD Lab. All rights reserved.
      </div>
    </div>
  </footer>
);

/* ──────────────── APP ROUTER ──────────────── */
function App() {
  const [route, setRoute] = useState(() => window.location.hash || '#home');
  useEffect(() => {
    const handleHash = () => setRoute(window.location.hash || '#home');
    window.addEventListener('hashchange', handleHash);
    return () => window.removeEventListener('hashchange', handleHash);
  }, []);
  const go = (r) => { window.location.hash = r; window.scrollTo(0, 0); };

  const renderPage = () => {
    const page = route.split('?')[0];
    switch (page) {
      case '#home': case '': case '#': return <HomePage go={go} />;
      case '#about': return <AboutPage />;
      case '#ops': return <OpsPage />;
      case '#store': return <div className="page"><div className="wrap"><section className="sec"><h1>시스템 스토어</h1><p>준비 중입니다.</p></section></div></div>;
      case '#cases': return <CasesPage />;
      default: return <HomePage go={go} />;
    }
  };

  return (
    <>
      <Nav route={route} go={go} />
      {renderPage()}
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
