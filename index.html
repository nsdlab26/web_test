<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSD Lab | Structure Design for Operations & Business</title>
<link rel="icon" href="favicon.png">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<style>
:root {
  --p: #8366EE;
  --p2: #9C81E3;
  --p3: #CAB4F4;
  --p4: #EDE5FF;
  --dark: #1e1b2e;
  --dark2: #252538;
  --fg: #1e1b2e;
  --fg2: #6b6578;
  --fg3: #9e98ab;
  --white: #ffffff;
  --border: #e8e0f5;
  --border2: #d9cef0;
  --nav-h: 68px;
  --max: 1120px;
  --r: 12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
  background: #f5f4f8;
  color: var(--fg);
  font-size: 16px;
  line-height: 1.75;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; cursor: pointer; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
ul { list-style: none; }

/* ── NAV ── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: var(--nav-h);
  background: rgba(254,252,241,0.88);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.nav-inner {
  max-width: var(--max); width: 100%; margin: 0 auto;
  padding: 0 40px; height: 100%;
  display: flex; align-items: center; gap: 4px;
}
.nav-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; margin-right: 12px; }
.nav-logo-text { font-size: 16px; font-weight: 800; color: var(--p); }
.nav-links { display: flex; align-items: center; gap: 2px; flex: 1; }
.nav-link {
  padding: 7px 12px; border-radius: 8px; font-size: 14px; font-weight: 500; color: var(--fg2); transition: all .15s;
}
.nav-link:hover, .nav-link.active { color: var(--p); background: var(--p4); font-weight: 700; }
.nav-cta {
  margin-left: auto; padding: 9px 20px; border-radius: var(--r);
  background: var(--p); color: var(--white); font-size: 14px; font-weight: 700;
  box-shadow: 0 4px 14px rgba(131,102,238,.35);
}

/* ── SECTION BASE ── */
.sec { padding: 88px 0; }
.wrap { max-width: var(--max); margin: 0 auto; padding: 0 40px; }
.sec-label { font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--p); margin-bottom: 12px; }
.sec-title { font-size: clamp(24px, 3.2vw, 36px); font-weight: 800; letter-spacing: -1px; line-height: 1.3; margin-bottom: 16px; }

/* ── HERO ── */
.hero { padding: 110px 0 80px; border-bottom: 1px solid var(--border); }
.hero-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
.hero-badge { display: inline-flex; padding: 6px 16px; border-radius: 99px; background: var(--p4); color: var(--p); font-size: 13px; font-weight: 700; margin-bottom: 24px; border: 1px solid var(--border2); }
.hero-title { font-size: clamp(32px, 4.2vw, 54px); font-weight: 900; letter-spacing: -1.5px; line-height: 1.2; margin-bottom: 24px; }
.hero-title span { color: var(--p); }
.hero-desc { font-size: 17px; color: var(--fg2); margin-bottom: 36px; }
.btn-p { background: var(--p); color: #fff; padding: 14px 28px; border-radius: 12px; font-weight: 700; box-shadow: 0 4px 16px rgba(131,102,238,.3); display: inline-block; }
.btn-out { border: 2px solid var(--border2); color: var(--fg); padding: 14px 28px; border-radius: 12px; font-weight: 700; display: inline-block; margin-left: 12px; }

/* ── WHY IT MATTERS (Dark) ── */
.why-sec { background: var(--dark); color: #fff; padding: 88px 0; }
.why-sub { font-size: 15px; color: var(--fg3); margin-bottom: 40px; }
.why-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
.why-card { background: var(--dark2); border: 1px solid #333350; border-radius: 16px; padding: 32px; }
.why-num { font-size: 36px; font-weight: 900; color: var(--p3); margin-bottom: 8px; }
.why-txt { font-size: 13px; color: var(--fg3); line-height: 1.6; }
.diag-banner { background: var(--dark2); border: 1.5px solid var(--p); border-radius: 20px; padding: 32px 40px; display: flex; align-items: center; justify-content: space-between; gap: 40px; }
.diag-title { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
.diag-desc { font-size: 13px; color: var(--fg3); line-height: 1.6; }
.btn-diag { background: var(--p); color: #fff; padding: 12px 24px; border-radius: 10px; font-weight: 700; white-space: nowrap; }

/* ── CORE SERVICES ── */
.svc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 48px; }
.svc-card { background: #fff; border: 1.5px solid var(--border); border-radius: 20px; padding: 40px; position: relative; transition: all .2s; }
.svc-card:hover { transform: translateY(-5px); border-color: var(--p3); box-shadow: 0 10px 30px rgba(131,102,238,0.1); }
.svc-icon-box { width: 52px; height: 52px; background: var(--p4); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 24px; box-shadow: inset 0 0 0 1px var(--border2); }
.svc-no { font-size: 11px; font-weight: 800; color: var(--p3); letter-spacing: 1px; margin-bottom: 12px; }
.svc-title { font-size: 22px; font-weight: 800; margin-bottom: 14px; }
.svc-desc { font-size: 14px; color: var(--fg2); margin-bottom: 24px; line-height: 1.7; }
.svc-tags { display: flex; gap: 8px; flex-wrap: wrap; }
.svc-tag { padding: 4px 12px; border-radius: 20px; background: #f0ebff; color: var(--p); font-size: 11px; font-weight: 700; }

/* ── STORE (Purple Section) ── */
.store-sec { background: #f0eeff; padding: 88px 0; }
.store-banner { background: #fff; border-radius: 20px; padding: 32px 40px; display: flex; align-items: center; justify-content: space-between; gap: 40px; box-shadow: 0 10px 40px rgba(131,102,238,0.08); margin-bottom: 48px; }
.store-chips { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
.store-chip { padding: 4px 12px; border-radius: 20px; border: 1.5px solid var(--border); font-size: 12px; color: var(--fg3); font-weight: 600; background: #fafafa; }
.shorts-label { font-size: 12px; font-weight: 800; color: var(--fg3); letter-spacing: 1px; margin-bottom: 24px; text-transform: uppercase; }
.shorts-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.short-card { background: var(--dark); border-radius: 16px; overflow: hidden; cursor: pointer; }
.short-thumb { aspect-ratio: 9/16; background: #252538; display: flex; align-items: center; justify-content: center; position: relative; }
.short-tag { position: absolute; top: 12px; left: 12px; background: rgba(131,102,238,0.6); color: #fff; padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; }
.short-play { width: 44px; height: 44px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; }
.short-title { padding: 14px; font-size: 13px; font-weight: 600; color: #e0dcfa; line-height: 1.5; }

/* ── FOOTER ── */
.footer { background: var(--dark); color: #fff; padding: 80px 0 48px; text-align: center; }
.foot-cta-btn { background: #fff; color: var(--p); padding: 18px 48px; border-radius: 16px; font-size: 18px; font-weight: 800; display: inline-block; margin-bottom: 18px; transition: all .2s; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
.foot-cta-btn:hover { background: var(--p4); transform: translateY(-2px); }
.foot-kakao { font-size: 14px; color: var(--fg3); text-decoration: underline; display: block; opacity: 0.8; }
.foot-kakao:hover { opacity: 1; color: #fff; }
.foot-meta { font-size: 12px; color: #444; margin-top: 64px; line-height: 2; text-align: left; }

@media (max-width: 768px) {
  .hero-wrap { grid-template-columns: 1fr; text-align: center; }
  .why-grid, .svc-grid, .shorts-grid { grid-template-columns: 1fr; }
  .diag-banner, .store-banner { flex-direction: column; text-align: center; padding: 32px 20px; }
  .hero-badge { margin: 0 auto 24px; }
  .hero-btns { justify-content: center; display: flex; flex-wrap: wrap; gap: 10px; }
  .btn-out { margin-left: 0; }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

/* ── Simple Router ── */
function App() {
  const [route, setRoute] = useState(window.location.hash || '#home');
  useEffect(() => {
    const handleHash = () => setRoute(window.location.hash || '#home');
    window.addEventListener('hashchange', handleHash);
    return () => window.removeEventListener('hashchange', handleHash);
  }, []);
  
  const go = (h) => { window.location.hash = h; window.scrollTo(0,0); };

  return (
    <>
      <Nav go={go} />
      <HomePage go={go} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</body>
