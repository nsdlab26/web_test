<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSD Lab | Structure Design for Operations & Business</title>
<link rel="icon" href="favicon.png">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root {
  --p: #8366EE;
  --p2: #9C81E3;
  --p3: #CAB4F4;
  --p4: #EDE5FF;
  --cream: #f5f4f8;
  --cream2: #ece8f5;
  --fg: #1e1b2e;
  --fg2: #6b6578;
  --fg3: #9e98ab;
  --white: #ffffff;
  --border: #e8e0f5;
  --border2: #d9cef0;
  --nav-h: 68px;
  --max: 1120px;
  --r: 12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
  background: #f5f4f8;
  color: var(--fg);
  font-size: 16px;
  line-height: 1.75;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; cursor: pointer; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
ul { list-style: none; }
p { text-wrap: pretty; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: var(--p3); border-radius: 3px; }

/* ── NAV ── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: var(--nav-h);
  background: rgba(254,252,241,0.88);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.nav-inner {
  max-width: var(--max); width: 100%; margin: 0 auto;
  padding: 0 40px; height: 100%;
  display: flex; align-items: center; gap: 4px;
}
.nav-logo {
  display: flex; align-items: center; gap: 10px;
  margin-right: 12px; cursor: pointer;
}
.nav-logo-img { width: 36px; height: 36px; border-radius: 50%; }
.nav-logo-text { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; color: var(--p); }
.nav-links { display: flex; align-items: center; gap: 2px; flex: 1; }
.nav-link {
  padding: 7px 12px; border-radius: 8px;
  font-size: 14px; font-weight: 500; color: var(--fg2);
  transition: all .15s; white-space: nowrap; position: relative;
}
.nav-link:hover { color: var(--p); background: var(--p4); }
.nav-link.active { color: var(--p); font-weight: 700; background: var(--p4); }
.nav-drop { position: relative; }
.nav-drop-menu {
  position: absolute; top: calc(100% + 6px); left: 0;
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--r); padding: 6px; min-width: 210px;
  box-shadow: 0 12px 32px rgba(131,102,238,.12);
  opacity: 0; pointer-events: none; transform: translateY(-6px);
  transition: all .15s;
}
.nav-drop:hover .nav-drop-menu { opacity: 1; pointer-events: all; transform: translateY(0); }
.nav-drop-item {
  display: block; padding: 9px 14px; border-radius: 8px;
  font-size: 14px; font-weight: 500; color: var(--fg2);
  transition: all .12s;
}
.nav-drop-item:hover { background: var(--p4); color: var(--p); }
.nav-cta {
  margin-left: auto;
  padding: 9px 20px; border-radius: var(--r);
  background: var(--p); color: var(--white);
  font-size: 14px; font-weight: 700;
  transition: all .15s; white-space: nowrap;
  box-shadow: 0 4px 14px rgba(131,102,238,.35);
}
.nav-cta:hover { background: var(--p2); transform: translateY(-1px); }
.chev { font-size: 9px; margin-left: 3px; opacity: .55; }

/* ── PAGE ── */
.page { padding-top: var(--nav-h); }
.wrap { max-width: var(--max); margin: 0 auto; padding: 0 40px; }

/* ── SECTION ── */
.sec { padding: 88px 0; }
.sec-alt { background: var(--white); }
.sec-dark { background: var(--fg); color: var(--white); }
.sec-purple { background: var(--p); color: var(--white); }
.sec-label {
  font-size: 12px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--p); margin-bottom: 12px;
}
.sec-dark .sec-label, .sec-purple .sec-label { color: var(--p3); }
.sec-title {
  font-size: clamp(26px, 3.2vw, 40px);
  font-weight: 800; letter-spacing: -1px; line-height: 1.22;
  margin-bottom: 16px;
}
.sec-sub { font-size: 16px; color: var(--fg2); line-height: 1.75; max-width: 560px; }
.sec-dark .sec-sub, .sec-purple .sec-sub { color: rgba(255,255,255,.65); }

/* ── BUTTONS ── */
.btn { display: inline-block; padding: 13px 26px; border-radius: var(--r); font-size: 15px; font-weight: 700; transition: all .15s; cursor: pointer; }
.btn-p { background: var(--p); color: #fff; box-shadow: 0 4px 16px rgba(131,102,238,.3); }
.btn-p:hover { background: var(--p2); transform: translateY(-1px); }
.btn-out { border: 2px solid var(--border2); color: var(--fg); background: transparent; }
.btn-out:hover { border-color: var(--p); color: var(--p); transform: translateY(-1px); }
.btn-white { background: #fff; color: var(--p); }
.btn-white:hover { background: var(--p4); transform: translateY(-1px); }
.btn-out-white { border: 2px solid rgba(255,255,255,.3); color: #fff; background: transparent; }
.btn-out-white:hover { border-color: #fff; }
.btn-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 36px; }

/* ── CARDS ── */
.grid { display: grid; gap: 20px; margin-top: 48px; }
.g2 { grid-template-columns: repeat(2,1fr); }
.g3 { grid-template-columns: repeat(3,1fr); }
.g4 { grid-template-columns: repeat(4,1fr); }
.card {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: calc(var(--r)*1.5); padding: 32px;
  transition: all .18s;
}
.card:hover { border-color: var(--p3); box-shadow: 0 6px 24px rgba(131,102,238,.1); transform: translateY(-3px); }
.card-icon {
  width: 48px; height: 48px; background: var(--p4);
  border-radius: var(--r); display: flex; align-items: center; justify-content: center;
  font-size: 22px; margin-bottom: 20px;
}
.card-title { font-size: 18px; font-weight: 800; letter-spacing: -.3px; margin-bottom: 8px; }
.card-desc { font-size: 14px; color: var(--fg2); line-height: 1.65; }
.card-arrow {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 13px; font-weight: 700; color: var(--p);
  margin-top: 16px; transition: gap .15s;
}
.card-arrow:hover { gap: 10px; }

/* ── HERO ── */
.hero { padding: 96px 0 80px; position: relative; overflow: hidden; }
.hero-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 16px; border-radius: 99px;
  background: var(--p4); color: var(--p);
  font-size: 13px; font-weight: 700; margin-bottom: 28px;
  border: 1px solid var(--border2);
}
.hero-title {
  font-size: clamp(32px, 4.2vw, 54px);
  font-weight: 900; letter-spacing: -1.5px;
  line-height: 1.18; margin-bottom: 20px;
}
.hero-title em { color: var(--p); font-style: normal; }
.hero-sub { font-size: 17px; color: var(--fg2); line-height: 1.75; margin-bottom: 8px; }
.hero-cred {
  display: flex; flex-direction: column; gap: 4px;
  margin: 20px 0 32px;
}
.hero-cred-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--fg2);
}
.hero-cred-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--p3); flex-shrink: 0; }
.hero-stack { display: flex; align-items: center; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; }
.hero-stack-label { font-size: 12px; color: var(--fg3); font-weight: 600; }
.stack-tag {
  padding: 4px 12px; border-radius: 6px;
  background: var(--p4); color: var(--p);
  font-size: 12px; font-weight: 700; border: 1px solid var(--border2);
}

/* ── HERO VISUAL ── */
.hero-visual { position: relative; height: 420px; }
.hv-bg {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--p4) 0%, #f0ebff 100%);
  border-radius: 24px; overflow: hidden;
}
.hv-node {
  position: absolute; display: flex; align-items: center; gap: 8px;
  background: #fff; border: 1.5px solid var(--border);
  border-radius: 10px; padding: 10px 14px;
  font-size: 13px; font-weight: 700; color: var(--fg);
  box-shadow: 0 4px 12px rgba(0,0,0,.06);
  animation: hvFloat 3s ease-in-out infinite;
}
.hv-node-icon { font-size: 16px; }
@keyframes hvFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.hv-center {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 80px; height: 80px; border-radius: 50%;
  background: var(--p);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 28px;
  box-shadow: 0 0 0 12px rgba(131,102,238,.15), 0 0 0 24px rgba(131,102,238,.07);
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 12px rgba(131,102,238,.15), 0 0 0 24px rgba(131,102,238,.07); }
  50% { box-shadow: 0 0 0 16px rgba(131,102,238,.12), 0 0 0 32px rgba(131,102,238,.05); }
}
.hv-line {
  position: absolute; top: 50%; left: 50%;
  transform-origin: 0 0;
  height: 1.5px; background: linear-gradient(to right, var(--p2), transparent);
  opacity: .35; pointer-events: none;
}

/* ── STATS ── */
.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--border); border-radius: calc(var(--r)*1.5); overflow: hidden; border: 1px solid var(--border); margin-top: 48px; }
.stat-cell { background: var(--white); padding: 32px; text-align: center; }
.stat-num { font-size: 42px; font-weight: 900; letter-spacing: -2px; color: var(--p); }
.stat-label { font-size: 13px; color: var(--fg2); margin-top: 6px; line-height: 1.5; }

/* ── PAIN ── */
.pain-wrap { background: var(--p4); border-radius: calc(var(--r)*1.5); padding: 40px; margin-top: 40px; border: 1px solid var(--border2); }
.pain-item { display: flex; gap: 16px; padding: 18px 0; border-bottom: 1px solid var(--border2); }
.pain-item:last-child { border-bottom: none; padding-bottom: 0; }
.pain-num { font-size: 13px; font-weight: 900; color: var(--p); min-width: 28px; padding-top: 2px; }
.pain-title { font-size: 16px; font-weight: 800; margin-bottom: 6px; }
.pain-list li { font-size: 14px; color: var(--fg2); padding: 3px 0 3px 14px; position: relative; }
.pain-list li::before { content: "·"; position: absolute; left: 0; color: var(--p2); font-weight: 900; }

/* ── SOLUTION BLOCKS ── */
.sol { display: grid; grid-template-columns: 2fr 3fr; gap: 0; border: 1.5px solid var(--border); border-radius: calc(var(--r)*1.5); overflow: hidden; margin-top: 20px; }
.sol:first-of-type { margin-top: 40px; }
.sol-l { background: var(--p); padding: 40px 32px; color: #fff; }
.sol-num { font-size: 52px; font-weight: 900; letter-spacing: -3px; opacity: .2; line-height: 1; }
.sol-t { font-size: 20px; font-weight: 800; margin-top: 10px; line-height: 1.35; }
.sol-r { padding: 40px 32px; background: var(--white); }
.sol-tag { display: inline-block; padding: 3px 10px; border-radius: 6px; background: var(--p4); color: var(--p); font-size: 12px; font-weight: 700; margin-bottom: 12px; }
.sol-desc { font-size: 15px; color: var(--fg2); line-height: 1.8; }

/* ── QUOTE ── */
.quote { background: var(--p4); border-left: 4px solid var(--p); padding: 22px 26px; border-radius: 0 var(--r) var(--r) 0; margin: 28px 0; font-size: 15px; font-weight: 500; line-height: 1.7; }

/* ── CHIPS ── */
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
.chip { padding: 5px 14px; border-radius: 99px; background: var(--white); border: 1.5px solid var(--border); font-size: 13px; font-weight: 600; color: var(--fg2); }
.chip-p { background: var(--p4); border-color: var(--border2); color: var(--p); }
.sector { padding: 6px 14px; border-radius: 99px; background: var(--white); border: 1.5px solid var(--border); font-size: 13px; font-weight: 600; }

/* ── NOTION WHY ── */
.why-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 40px; }
.why-item { background: #f5f4f8; border-radius: calc(var(--r)*1.5); padding: 28px; border: 1px solid var(--border); }
.why-item-t { font-size: 16px; font-weight: 800; margin-bottom: 8px; }
.why-item-d { font-size: 14px; color: var(--fg2); line-height: 1.65; }

/* ── PROCESS ── */
.process { margin-top: 40px; }
.p-step { display: flex; gap: 20px; padding: 22px 0; border-bottom: 1px solid var(--border); }
.p-step:last-child { border-bottom: none; }
.p-idx { width: 34px; height: 34px; border-radius: 50%; background: var(--p); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; flex-shrink: 0; margin-top: 2px; }
.p-title { font-size: 16px; font-weight: 700; margin-bottom: 5px; }
.p-desc { font-size: 14px; color: var(--fg2); line-height: 1.65; }

/* ── INFO BOX ── */
.ibox { background: var(--white); border: 1.5px solid var(--border); border-radius: calc(var(--r)*1.5); padding: 28px; }
.ibox + .ibox { margin-top: 16px; }
.ibox-label { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--p); margin-bottom: 14px; }
.irow { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.irow:last-child { border-bottom: none; padding-bottom: 0; }
.irow-k { font-weight: 700; min-width: 90px; flex-shrink: 0; }
.irow-v { color: var(--fg2); }

/* ── ADDON TABLE ── */
.atbl { width: 100%; border-collapse: collapse; border: 1.5px solid var(--border); border-radius: calc(var(--r)*1.5); overflow: hidden; margin-top: 40px; }
.atbl th { background: var(--p); color: #fff; padding: 14px 20px; text-align: left; font-size: 13px; font-weight: 700; }
.atbl td { padding: 13px 20px; border-top: 1px solid var(--border); font-size: 14px; background: var(--white); }
.atbl tr:nth-child(even) td { background: #f5f4f8; }
.t-in { background: var(--p4); color: var(--p); padding: 2px 9px; border-radius: 5px; font-size: 12px; font-weight: 700; }
.t-op { background: var(--cream2); color: var(--fg2); padding: 2px 9px; border-radius: 5px; font-size: 12px; font-weight: 700; }

/* ── TYPE CARD ── */
.tcard { border: 1.5px solid var(--border); border-radius: calc(var(--r)*1.5); overflow: hidden; margin-top: 16px; }
.tcard-head { background: var(--p4); padding: 18px 26px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--border); }
.tbadge { background: var(--p); color: #fff; padding: 4px 11px; border-radius: 6px; font-size: 12px; font-weight: 800; }
.tcard-title { font-size: 17px; font-weight: 800; }
.tcard-body { padding: 26px; background: var(--white); }
.styled-li { margin-top: 12px; }
.styled-li li { font-size: 14px; color: var(--fg2); padding: 5px 0 5px 18px; position: relative; }
.styled-li li::before { content: "—"; position: absolute; left: 0; color: var(--p2); }

/* ── CASES ── */
.ccard { background: var(--white); border: 1.5px solid var(--border); border-radius: calc(var(--r)*1.5); overflow: hidden; transition: all .18s; }
.ccard:hover { box-shadow: 0 8px 28px rgba(131,102,238,.13); transform: translateY(-4px); border-color: var(--p3); }
.cthumb { height: 164px; background: var(--p4); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--border); }
.cbody { padding: 22px; }
.ctag { font-size: 11px; font-weight: 800; letter-spacing: 1px; color: var(--p); text-transform: uppercase; margin-bottom: 7px; }
.ctitle { font-size: 16px; font-weight: 800; margin-bottom: 5px; line-height: 1.4; }
.cdesc { font-size: 13px; color: var(--fg2); }

/* ── CTA BAND ── */
.cta-band { background: var(--p); padding: 88px 0; text-align: center; color: #fff; }
.cta-band h2 { font-size: clamp(28px,3.5vw,40px); font-weight: 900; letter-spacing: -1px; margin-bottom: 12px; }
.cta-band p { font-size: 16px; opacity: .75; max-width: 480px; margin: 0 auto 36px; }
.cta-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

/* ── FOOTER ── */
.footer { background: var(--fg); padding: 52px 0 36px; color: #fff; }
.footer-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }
.footer-logo { font-size: 16px; font-weight: 800; color: var(--p3); margin-bottom: 12px; }
.footer-meta { font-size: 12px; color: rgba(255,255,255,.45); line-height: 2; }
.footer-links { display: flex; flex-direction: column; align-items: flex-end; gap: 14px; }
.footer-link-row { display: flex; gap: 16px; }
.flink { font-size: 13px; color: rgba(255,255,255,.5); transition: color .12s; }
.flink:hover { color: #fff; }
.footer-copy { font-size: 12px; color: rgba(255,255,255,.25); margin-top: 28px; text-align: center; }

/* ── PROFILE ── */
.prof-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 56px; margin-top: 48px; }
.pcard { background: var(--white); border: 1.5px solid var(--border); border-radius: calc(var(--r)*1.5); padding: 32px; }
.pname { font-size: 22px; font-weight: 900; letter-spacing: -.5px; margin-bottom: 4px; }
.ptitle { font-size: 14px; color: var(--p); font-weight: 700; margin-bottom: 20px; }
.pitem { font-size: 14px; color: var(--fg2); padding: 7px 0; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-start; }
.pitem:last-child { border-bottom: none; }
.pdot { color: var(--p); font-size: 16px; margin-top: -1px; flex-shrink: 0; }
.eitem { padding: 16px 0; border-bottom: 1px solid var(--border); }
.eitem:last-child { border-bottom: none; }
.eco { font-size: 16px; font-weight: 800; margin-bottom: 3px; }
.erole { font-size: 14px; color: var(--fg2); }

/* ── ACTIVITY ── */
.act-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 40px; }
.act-item { background: var(--white); border: 1.5px solid var(--border); border-radius: calc(var(--r)*1.5); padding: 22px; }
.act-type { font-size: 11px; font-weight: 800; letter-spacing: 1px; color: var(--p); text-transform: uppercase; margin-bottom: 8px; }
.act-t { font-size: 14px; font-weight: 800; line-height: 1.4; margin-bottom: 4px; }
.act-org { font-size: 13px; color: var(--fg2); }

/* ── PLACEHOLDER ── */
.ph { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 120px 0; text-align: center; }
.ph-icon { font-size: 52px; margin-bottom: 24px; }
.ph-title { font-size: 28px; font-weight: 900; margin-bottom: 12px; }
.ph-desc { font-size: 16px; color: var(--fg2); max-width: 400px; line-height: 1.7; margin-bottom: 32px; }

/* ── DIVIDER ── */
.sec + .sec { border-top: 1px solid var(--border); }
.sec-alt + .sec-alt { border-top: 1px solid var(--border); }

/* ── TWO COL ── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; }

/* ── SCROLL FADE ── */
.fade-up { opacity: 0; transform: translateY(28px); transition: opacity .6s ease, transform .6s ease; }
.fade-up.visible { opacity: 1; transform: none; }

/* ── SVCPAGE HERO ── */
.svchero { padding: 80px 0 64px; border-bottom: 1px solid var(--border); }
.svchero-label { font-size: 12px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--p); margin-bottom: 16px; }
.svchero-title { font-size: clamp(28px,4vw,50px); font-weight: 900; letter-spacing: -1px; line-height: 1.2; margin-bottom: 16px; }
.svchero-sub { font-size: 18px; color: var(--fg2); line-height: 1.75; max-width: 620px; margin-bottom: 8px; }

/* ── SYSTEM DIAGRAM (Ops page visual) ── */
.sys-diag { position: relative; margin: 48px 0 0; }
.sys-center { display: flex; align-items: center; justify-content: center; margin-bottom: 0; }
.sys-hub {
  width: 96px; height: 96px; border-radius: 50%;
  background: var(--p); color: #fff;

const { useState, useEffect, useRef, useCallback } = React;

/* ── scroll fade hook ── */
function useFadeUp() {
  useEffect(() => {
    const els = document.querySelectorAll('.fade-up');
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {if (e.isIntersecting) {e.target.classList.add('visible');io.unobserve(e.target);}});
    }, { threshold: 0.12 });
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  });
}

/* ── counter hook ── */
function useCounter(target, duration = 1600) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(([e]) => {
      if (!e.isIntersecting) return;
      io.disconnect();
      const start = performance.now();
      const tick = (now) => {
        const p = Math.min((now - start) / duration, 1);
        setVal(Math.round(p * target));
        if (p < 1) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    }, { threshold: .5 });
    io.observe(el);
    return () => io.disconnect();
  }, [target, duration]);
  return [val, ref];
}

/* ── router ── */
function useRoute() {
  const [route, setRoute] = useState(() => window.location.hash || '#home');
  useEffect(() => {
    const h = () => setRoute(window.location.hash || '#home');
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  }, []);
  const go = (r) => {window.location.hash = r;window.scrollTo(0, 0);};
  return [route, go];
}

} /*EDITMODE-END*/;

function TweaksUI() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  useEffect(() => {
    document.documentElement.style.setProperty('--p', t.primaryColor);
    document.documentElement.style.setProperty('--cream', t.bgColor);
    document.documentElement.style.fontSize = t.fontScale / 100 * 16 + 'px';
  }, [t]);
  return (
    <TweaksPanel>
      <TweakSection label="브랜드 컬러">
        <TweakColor label="메인 퍼플" value={t.primaryColor} onChange={(v) => setTweak('primaryColor', v)} />
